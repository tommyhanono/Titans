<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Basket Activity Log</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

    /* ── Login Screen ── */
    #loginScreen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; gap: 20px; padding: 32px;
    }
    #loginScreen h1 { font-size: 24px; letter-spacing: 2px; color: #fff; }
    #loginScreen p  { color: #64748b; font-size: 14px; }
    #pwInput {
      padding: 12px 16px; border-radius: 8px; border: 1px solid #334155;
      background: #1e2532; color: #fff; font-size: 16px; width: 260px; outline: none;
    }
    #pwInput:focus { border-color: #3b82f6; }
    #loginBtn {
      padding: 12px 32px; border-radius: 8px; border: none;
      background: #3b82f6; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    #loginBtn:hover { background: #2563eb; }
    #loginErr { color: #ef4444; font-size: 13px; display: none; }

    /* ── Dashboard ── */
    #dashboard { display: none; padding: 24px; max-width: 1100px; margin: 0 auto; }
    .dash-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
    }
    .dash-header h1 { font-size: 20px; letter-spacing: 1px; }
    .dash-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    select, input[type=text] {
      padding: 8px 12px; border-radius: 6px; border: 1px solid #334155;
      background: #1e2532; color: #e2e8f0; font-size: 13px;
    }
    #refreshBtn {
      padding: 8px 18px; border-radius: 6px; border: none;
      background: #1e40af; color: #fff; font-size: 13px; cursor: pointer;
    }
    #refreshBtn:hover { background: #1d4ed8; }
    .stats-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .stat-card {
      background: #1e2532; border-radius: 10px; padding: 16px;
      border: 1px solid #1e3a5f;
    }
    .stat-card .num { font-size: 32px; font-weight: 700; color: #60a5fa; }
    .stat-card .lbl { font-size: 12px; color: #64748b; margin-top: 4px; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      background: #1e2532; padding: 10px 14px; text-align: left;
      color: #94a3b8; font-weight: 600; border-bottom: 1px solid #1e3a5f; white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #1a202c; }
    tbody tr:hover { background: #1a2536; }
    tbody td { padding: 9px 14px; color: #cbd5e1; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
    }
    .badge-open    { background: #1e3a5f; color: #60a5fa; }
    .badge-save    { background: #14532d; color: #4ade80; }
    .badge-other   { background: #2d2736; color: #a78bfa; }
    .tracker-chip {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; background: #1e293b; color: #94a3b8;
    }
    #emptyMsg { text-align: center; padding: 60px; color: #475569; font-size: 15px; }
    #loadingMsg { text-align: center; padding: 60px; color: #64748b; font-size: 14px; }
    #logoutBtn {
      padding: 6px 14px; border-radius: 6px; border: 1px solid #334155;
      background: transparent; color: #64748b; font-size: 12px; cursor: pointer;
    }
    #logoutBtn:hover { color: #e2e8f0; border-color: #475569; }
  </style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div style="font-size:48px">🏀</div>
  <h1>BASKET ADMIN</h1>
  <p>Panel de actividad — solo admin</p>
  <input id="pwInput" type="password" placeholder="Contraseña" autocomplete="current-password">
  <button id="loginBtn" onclick="doLogin()">Entrar</button>
  <div id="loginErr">Contraseña incorrecta</div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="dash-header">
    <h1>🏀 Basket Activity Log</h1>
    <div class="dash-controls">
      <select id="filterTracker"><option value="">Todos los trackers</option></select>
      <select id="filterEvent">
        <option value="">Todos los eventos</option>
        <option value="app_open">app_open</option>
        <option value="history_save">history_save</option>
      </select>
      <input id="filterSearch" type="text" placeholder="Buscar..." style="width:160px">
      <button id="refreshBtn" onclick="loadLog()">↺ Actualizar</button>
      <button id="logoutBtn" onclick="doLogout()">Cerrar sesión</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="num" id="statTotal">—</div><div class="lbl">Eventos totales</div></div>
    <div class="stat-card"><div class="num" id="statOpens">—</div><div class="lbl">App opens</div></div>
    <div class="stat-card"><div class="num" id="statSaves">—</div><div class="lbl">Partidos guardados</div></div>
    <div class="stat-card"><div class="num" id="statTrackers">—</div><div class="lbl">Trackers activos</div></div>
  </div>

  <div class="table-wrap">
    <div id="loadingMsg">Cargando...</div>
    <div id="emptyMsg" style="display:none">Sin actividad registrada.</div>
    <table id="logTable" style="display:none">
      <thead>
        <tr>
          <th>Fecha / Hora</th>
          <th>Evento</th>
          <th>Tracker</th>
          <th>Extra</th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>
</div>

<script>
const FB_BASE = 'https://titans-tracker-default-rtdb.firebaseio.com';
const PW_HASH = 'b29812aaafb56b9be02534da3fb7fcebbdaefad317cf8db0aab0cea26bd8fbf0';

const TRACKER_LABELS = {
  titans_copa18: 'Titans Copa Sub 18',
  titans_ludos18: 'Titans Ludos Sub 18',
  titans_copa16: 'Titans Copa Sub 16',
  titans_ludos14: 'Titans Ludos Sub 14',
  titans_copa12: 'Titans Copa Sub 12',
  mba_sub13: 'MBA Sub 13',
  mba_sub15: 'MBA Sub 15',
  mba_sub17: 'MBA Sub 17',
};

let allEvents = [];

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function doLogin() {
  const pw = document.getElementById('pwInput').value;
  const hash = await sha256(pw);
  if (hash === PW_HASH) {
    sessionStorage.setItem('admin_ok', '1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadLog();
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('pwInput').value = '';
  }
}

function doLogout() {
  sessionStorage.removeItem('admin_ok');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pwInput').value = '';
}

document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
  document.getElementById('loginErr').style.display = 'none';
});

['filterTracker', 'filterEvent', 'filterSearch'].forEach(id =>
  document.getElementById(id).addEventListener('input', renderTable));

async function loadLog() {
  document.getElementById('loadingMsg').style.display = 'block';
  document.getElementById('emptyMsg').style.display = 'none';
  document.getElementById('logTable').style.display = 'none';

  try {
    const r = await fetch(`${FB_BASE}/activity_log.json`);
    const data = await r.json();

    if (!data) { allEvents = []; }
    else {
      allEvents = Object.values(data).map(e => ({
        event: e.event || '',
        tracker: e.tracker || '',
        ts: e.ts || 0,
        extra: { ...e, event: undefined, tracker: undefined, ts: undefined }
      })).sort((a, b) => b.ts - a.ts);
    }

    // Populate tracker filter
    const sel = document.getElementById('filterTracker');
    const trackers = [...new Set(allEvents.map(e => e.tracker))].sort();
    sel.innerHTML = '<option value="">Todos los trackers</option>';
    trackers.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = TRACKER_LABELS[t] || t;
      sel.appendChild(opt);
    });

    renderTable();
  } catch(e) {
    document.getElementById('loadingMsg').textContent = 'Error al cargar: ' + e.message;
  }
}

function renderTable() {
  const filterT = document.getElementById('filterTracker').value;
  const filterE = document.getElementById('filterEvent').value;
  const filterS = document.getElementById('filterSearch').value.toLowerCase();

  const filtered = allEvents.filter(e => {
    if (filterT && e.tracker !== filterT) return false;
    if (filterE && e.event !== filterE) return false;
    if (filterS) {
      const hay = (e.event + e.tracker + (TRACKER_LABELS[e.tracker]||'')).toLowerCase();
      if (!hay.includes(filterS)) return false;
    }
    return true;
  });

  const opens  = filtered.filter(e => e.event === 'app_open').length;
  const saves  = filtered.filter(e => e.event === 'history_save').length;
  const activeT = new Set(filtered.map(e => e.tracker)).size;

  document.getElementById('statTotal').textContent    = filtered.length;
  document.getElementById('statOpens').textContent    = opens;
  document.getElementById('statSaves').textContent    = saves;
  document.getElementById('statTrackers').textContent = activeT;

  document.getElementById('loadingMsg').style.display = 'none';

  if (filtered.length === 0) {
    document.getElementById('emptyMsg').style.display = 'block';
    document.getElementById('logTable').style.display = 'none';
    return;
  }

  document.getElementById('emptyMsg').style.display = 'none';
  document.getElementById('logTable').style.display = 'table';

  const body = document.getElementById('logBody');
  body.innerHTML = '';
  filtered.forEach(e => {
    const tr = document.createElement('tr');
    const dt = e.ts ? new Date(e.ts).toLocaleString('es-PA', {
      year:'numeric', month:'2-digit', day:'2-digit',
      hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false
    }) : '—';

    const badgeCls = e.event === 'app_open' ? 'badge-open'
                   : e.event === 'history_save' ? 'badge-save' : 'badge-other';

    let detail = '';
    if (e.event === 'history_save' && e.extra.gameName) {
      const score = (e.extra.titansScore != null && e.extra.rivalScore != null)
        ? `<span style="color:#4ade80;font-weight:600">${e.extra.titansScore}</span> - <span style="color:#f87171">${e.extra.rivalScore}</span> `
        : '';
      const players = Array.isArray(e.extra.players) && e.extra.players.length
        ? `<div style="color:#64748b;font-size:11px;margin-top:4px">${e.extra.players.join(' · ')}</div>`
        : '';
      detail = `<div>${score}<span style="color:#e2e8f0">${e.extra.gameName}</span></div>${players}`;
    } else if (e.event === 'app_open' && Array.isArray(e.extra.players) && e.extra.players.length) {
      detail = `<div style="color:#64748b;font-size:11px">${e.extra.players.join(' · ')}</div>`;
    } else {
      const extraKeys = Object.keys(e.extra).filter(k => e.extra[k] != null && k !== 'players');
      detail = extraKeys.length ? extraKeys.map(k => `${k}: ${e.extra[k]}`).join(', ') : '—';
    }

    tr.innerHTML = `
      <td>${dt}</td>
      <td><span class="badge ${badgeCls}">${e.event}</span></td>
      <td><span class="tracker-chip">${TRACKER_LABELS[e.tracker] || e.tracker || '—'}</span></td>
      <td style="font-size:12px">${detail}</td>
    `;
    body.appendChild(tr);
  });
}

// Auto-enter if already logged in this session
if (sessionStorage.getItem('admin_ok') === '1') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadLog();
}
</script>
</body>
</html>
