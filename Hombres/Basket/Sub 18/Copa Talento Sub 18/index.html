<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Titans Sub 18">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="manifest" href="manifest.json">

  <title>Titans Sub 18</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ═══ HEADER ═══════════════════════════════════════════════════════════ -->
  <header id="header">
    <div class="hd-brand">
      <span class="brand-text">TITANS</span>
      <input id="gameName" type="text" value="Titans vs ___"
             autocomplete="off" spellcheck="false" aria-label="Nombre del partido">
    </div>

    <div class="hd-clock">
      <div id="clockDisplay" class="clock-num">10:00</div>
      <span id="clockQuarter" class="clock-qtr">Q1</span>
      <button id="btnToggleClock" class="icon-btn play-btn" aria-label="Iniciar/Pausar">▶</button>
      <button id="btnResetClock"  class="icon-btn"          aria-label="Resetear cuarto">↺</button>
    </div>

    <div class="hd-right">
      <div class="score-box">PTS <span id="scoreVal">0</span></div>
      <div id="quarterSelector" class="qtr-sel" role="group" aria-label="Cuarto"></div>
    </div>
  </header>

  <!-- ═══ CUERPO (split en landscape) ════════════════════════════════════ -->
  <div class="app-body">

    <!-- Panel izquierdo (landscape) / sección superior (portrait) -->
    <aside id="panelLeft">

      <!-- Jugador activo -->
      <div id="activeBadge" class="active-badge">
        <div id="activeName" class="active-name">Selecciona un jugador</div>
        <div id="activeStatus" class="active-status"></div>
      </div>

      <!-- Lista de jugadores (scroll horizontal) -->
      <div id="playerList" class="player-list" role="list"></div>

      <!-- Log de acciones (solo visible en landscape) -->
      <div id="actionLog" class="action-log landscape-only"></div>

      <!-- Controles -->
      <div class="ctrl-bar">
        <button id="btnUndo"      class="ctrl-btn">↩ Deshacer</button>
        <button id="btnSave"      class="ctrl-btn">💾 Guardar</button>
        <button id="btnLoad"      class="ctrl-btn">📂 Cargar</button>
        <button id="btnNewGame"   class="ctrl-btn new-game-btn">🔄 Nuevo</button>
        <button id="btnReport"    class="ctrl-btn accent-btn">📝 Resumen</button>
        <button id="btnHistorial" class="ctrl-btn hist-btn">📚 Historial</button>
        <button id="btnPlantillas" class="ctrl-btn tpl-btn">👥 Plantillas</button>
        <button id="btnTable"     class="ctrl-btn">📋</button>
        <button id="btnAdd"       class="ctrl-btn">＋</button>
        <button id="btnRemove"    class="ctrl-btn danger-btn">－</button>
      </div>
    </aside>

    <!-- Panel derecho: botones de estadísticas -->
    <main id="panelRight">
      <div id="statGrid" class="stat-grid" role="group" aria-label="Estadísticas"></div>
    </main>

  </div><!-- /app-body -->

  <!-- ═══ TABLA (toggle) ══════════════════════════════════════════════════ -->
  <section id="tableSection" class="table-section hidden" aria-live="polite">
    <div class="table-topbar">
      <span>ESTADÍSTICAS EN VIVO</span>
      <button id="btnCloseTable" class="close-btn">✕</button>
    </div>
    <div class="table-scroll">
      <table id="statsTable"></table>
    </div>
  </section>

</div><!-- /app -->

<!-- Toast notifications -->
<div id="toast" role="status" aria-live="polite"></div>

<!-- SheetJS — cargado async; SW lo cachea para uso offline -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js" defer></script>
<script src="app.js?v=3" defer></script>

<!-- Plantillas Modal -->
<div id="tplModal" class="tpl-overlay" hidden>
  <div class="tpl-box">
    <div class="tpl-hdr">
      <span>👥 Plantillas de Equipo</span>
      <button class="tpl-close-btn" onclick="document.getElementById('tplModal').hidden=true">✕</button>
    </div>
    <div id="tplList" class="tpl-list"></div>
    <div class="tpl-footer">
      <button class="tpl-action-btn" onclick="saveCurrentAsTemplate()">💾 Guardar nómina actual como plantilla</button>
    </div>
  </div>
</div>

<!-- Auth Overlay -->
<div id="auth-overlay" style="position:fixed;inset:0;z-index:9999;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:32px;font-family:system-ui,sans-serif">
  <div style="text-align:center;color:#fff">
    <div style="font-size:52px;margin-bottom:8px">🏀</div>
    <h2 style="margin:0 0 4px;font-size:22px;letter-spacing:2px">BASKET STATS</h2>
    <p style="margin:0;color:#8892a4;font-size:13px">Acceso restringido — solo equipos autorizados</p>
  </div>
  <div id="auth-login" style="text-align:center">
    <button id="btn-google-signin" style="display:flex;align-items:center;gap:10px;background:#fff;color:#3c4043;border:none;padding:12px 24px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.3)">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Iniciar sesión con Google
    </button>
  </div>
  <div id="auth-loading" style="display:none;text-align:center;color:#8892a4;font-size:14px">Verificando acceso...</div>
  <div id="auth-pending" style="display:none;text-align:center">
    <div style="font-size:40px;margin-bottom:8px">⏳</div>
    <p style="color:#fff;font-size:17px;font-weight:600;margin:0 0 6px">Esperando aprobación</p>
    <p id="auth-email" style="color:#8892a4;font-size:13px;margin:0 0 4px"></p>
    <p style="color:#666;font-size:12px;margin:0 0 16px">El administrador debe aprobar tu acceso.<br>Recargá la página después de recibir confirmación.</p>
    <div style="display:flex;gap:8px;justify-content:center">
      <button onclick="checkMyApproval()" style="background:#2563eb;color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:13px">Verificar de nuevo</button>
      <button onclick="firebaseSignOut()" style="background:transparent;color:#666;border:1px solid #444;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:13px">Cerrar sesión</button>
    </div>
  </div>
</div>

</body>
</html>
